name: Poster Instagram

on:
  schedule:
    - cron: "*/15 * * * *"  # toutes les 15 minutes
  workflow_dispatch:         # pour déclencher manuellement si besoin

jobs:
  post_instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write   # pour créer une issue GitHub en cas d'échec

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Process Instagram Payloads
        id: publish
        env:
          CLIPS_ACCESS_TOKEN: ${{ secrets.CLIPS_ACCESS_TOKEN }}
          CYBERPUNK_ACCESS_TOKEN: ${{ secrets.CYBERPUNK_ACCESS_TOKEN }}
          INFLUENCER_ACCESS_TOKEN: ${{ secrets.INFLUENCER_ACCESS_TOKEN }}
          SUNDRESS_ACCESS_TOKEN: ${{ secrets.SUNDRESS_ACCESS_TOKEN }}
          UNIVERSITY_ACCESS_TOKEN: ${{ secrets.UNIVERSITY_ACCESS_TOKEN }}
          CLIPS_FACEBOOK_ID: ${{ vars.CLIPS_FACEBOOK_ID }}
          CLIPS_INSTAGRAM_ID: ${{ vars.CLIPS_INSTAGRAM_ID }}
          CYBERPUNK_FACEBOOK_ID: ${{ vars.CYBERPUNK_FACEBOOK_ID }}
          CYBERPUNK_INSTAGRAM_ID: ${{ vars.CYBERPUNK_INSTAGRAM_ID }}
          INFLUENCER_FACEBOOK_ID: ${{ vars.INFLUENCER_FACEBOOK_ID }}
          INFLUENCER_INSTAGRAM_ID: ${{ vars.INFLUENCER_INSTAGRAM_ID }}
          SUNDRESS_FACEBOOK_ID: ${{ vars.SUNDRESS_FACEBOOK_ID }}
          SUNDRESS_INSTAGRAM_ID: ${{ vars.SUNDRESS_INSTAGRAM_ID }}
          UNIVERSITY_FACEBOOK_ID: ${{ vars.UNIVERSITY_FACEBOOK_ID }}
          UNIVERSITY_INSTAGRAM_ID: ${{ vars.UNIVERSITY_INSTAGRAM_ID }}

        run: |
          echo "[REFRESH] Lancement du script de publication Instagram..."
          python scripts/process_payloads.py

      - name: Notify on failure
        if: failure() && steps.publish.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('fr-CH', {timeZone: 'Europe/Zurich'});
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠️ Publication Instagram échouée — ${now}`,
              body:  `Des erreurs ont été détectées lors de la publication automatique.\n\n` +
                     `👉 [Voir les logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: []
            });
